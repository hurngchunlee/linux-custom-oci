# Kernel arguments module
# Target: x86_64 laptops with integrated GPU only (Intel or AMD iGPU).
# Disables the NVIDIA dGPU (Optimus) and enforces modesetting driver
type: kargs
arch: x86_64

kargs:
  # --- GPU: disable NVIDIA dGPU, force integrated GPU / modesetting ---
  - modprobe.blacklist=nouveau        # blacklist open-source NVIDIA driver
  - rd.driver.blacklist=nouveau       # prevent nouveau loading in initrd
  - nvidia-drm.modeset=0              # disable NVIDIA DRM modesetting (dGPU off)

  # --- Power management ---
  - amd_pstate=active
  - intel_pstate=active

  # Better NVMe power management (reduces idle power draw on SSDs)
  - nvme.noacpi=1

  # --- Security / audit ---
  - selinux=1
  - enforcing=1
  - audit=1
  - audit_backlog_limit=8192
