# Docker module
modules:
  - type: dnf
    repos:
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
      cleanup: true  # remove the Docker repo file after packages are installed
    install:
      packages:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin

  # docker daemon is disabled in favor of rootless setup
  - type: systemd
    system:
      disabled:
        - docker.service