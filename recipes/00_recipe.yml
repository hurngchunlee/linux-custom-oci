# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: fedora-silverblue
description: "GNOME laptop image based on Universal Blue Silverblue."

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:

  # Install all packages
  - from-file: packages.yml
  - from-file: eduvpn.yml
  - from-file: docker.yml
  - from-file: nix.yml

  # Apply system policy/configuration
  - from-file: system.yml

  # Enable/configure services
  - from-file: services.yml

  # Boot/kernel settings
  - from-file: laptop-kargs.yml

  - type: signing
