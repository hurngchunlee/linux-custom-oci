modules:

  - type: script
    snippets:
      - "mkdir -p /var/nix"
      - "ln -s /var/nix /nix"

  - type: dnf
    install:
      packages:
        - nix
        - nix-daemon

  - type: script
    snippets:
      - "rm -f /nix"
      - "mkdir -p /nix"

  - type: files
    files:
      - source: usr/lib/systemd/system/nix.mount
        destination: /usr/lib/systemd/system/nix.mount

  - type: systemd
    system:
      enabled:
        - nix.mount
        - nix-daemon.service