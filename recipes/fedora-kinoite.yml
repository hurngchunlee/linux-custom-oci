# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: fedora-kinoite
description: "KDE plasma laptop image based on Universal Blue Kinoite."

base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

modules:

  # Install all packages
  - from-file: common/packages.yml
  - from-file: common/eduvpn.yml
  - from-file: common/docker.yml
  - from-file: common/nix.yml

  # Apply system policy/configuration
  - from-file: common/system.yml

  # Enable/configure services
  - from-file: common/services.yml

  # Boot/kernel settings
  - from-file: common/laptop-kargs.yml

  # # Extra customization for KDE Plasma desktop
  # - from-file: kde/appstore-disable-dnf.yml

  - type: signing
