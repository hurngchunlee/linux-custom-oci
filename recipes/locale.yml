# Locale and timezone module
# Source: modules/common.nix
#   time.timeZone = "Europe/Amsterdam"
#   i18n.defaultLocale = "en_US.UTF-8"
#
# Step 1: Copy files/etc/ into /etc/ in the image (locale.conf).
# On Atomic Fedora, files written to /etc/ at build time are automatically
# migrated to /usr/etc/ (the system config template layer) on deployment.
modules:
  - type: files
    files:
      - source: etc          # copies files/etc/* into /etc/ in the image
        destination: /etc

  # Step 2: Set the timezone symlink.
  # /etc/localtime must be a symlink to the correct zoneinfo file.
  # The files module cannot create symlinks, so a script snippet is used.
  - type: script
    snippets:
      - "ln -sf /usr/share/zoneinfo/Europe/Amsterdam /etc/localtime"
