# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
---
name: fedora-silverblue
description: "GNOME laptop image based on Universal Blue Silverblue."

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:

  # Install all packages
  - from-file: common/packages.yml
  - from-file: common/eduvpn.yml
  - from-file: common/docker.yml
  - from-file: common/nix.yml

  # Apply system policy/configuration
  - from-file: common/system.yml

  # Enable/configure services
  - from-file: common/services.yml

  # Boot/kernel settings
  - from-file: common/laptop-kargs.yml

  # Extra customization for GNOME desktop
  - from-file: gnome/appstore-disable-dnf.yml

  - type: signing
