# Docker module
# Source: modules/docker.nix
#   virtualisation.docker.rootless.enable = true
#   virtualisation.docker.rootless.setSocketVariable = true
#
# Installs Docker CE from the official Docker repository in rootless mode.
# The system Docker daemon is NOT enabled; each user runs their own rootless
# Docker daemon via systemd user session, matching the NixOS configuration.
modules:
  - type: dnf
    repos:
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
      cleanup: true  # remove the Docker repo file after packages are installed
    install:
      packages:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin

  # Run the rootless Docker setup script at build time
  - type: script
    scripts:
      - docker-rootless.sh
